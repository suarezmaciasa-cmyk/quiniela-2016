<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase via REST API - no SDK needed -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:940px;margin:0 auto;padding:1rem}
.header{text-align:center;padding:1.2rem 0 .8rem}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:12px;color:#666;margin-top:3px}
.tabs{display:flex;gap:3px;margin:.6rem 0;background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:4px;overflow-x:auto}
.tab{flex:1;min-width:55px;padding:7px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:12px;color:#666;font-family:inherit;white-space:nowrap;position:relative}
.tab.active{background:#f0f0e8;color:#1a1a1a;font-weight:700}
.tab-admin-btn::after{content:' 🔒';font-size:9px}
.tab-admin-btn.unlocked::after{content:' 🔓'}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1rem 1.2rem;margin-bottom:.7rem}
.sec{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:1rem 0 .5rem}
.sec:first-child{margin-top:0}
.mrow{display:grid;grid-template-columns:1fr 125px 1fr;gap:6px;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0e8}
.mrow:last-child{border-bottom:none}
.tname{font-size:12px;font-weight:700}
.th{text-align:right}.ta{text-align:left}
.mcenter{display:flex;flex-direction:column;align-items:center;gap:3px}
.mdate{font-size:10px;color:#999}
.score-wrap{display:flex;align-items:center;gap:3px}
.score-in{width:30px;height:28px;border:1px solid #ccc;border-radius:6px;text-align:center;font-size:14px;font-weight:700;font-family:inherit;background:#fff;padding:0}
.score-dash{font-size:14px;font-weight:700;color:#999}
.score-wrap.filled .score-in{background:#dbeeff;border-color:#185FA5;color:#0c447c}
.score-wrap.correct .score-in{background:#d4edda;border-color:#2d6a1a;color:#1a4a0a}
.score-wrap.wrong .score-in{background:#fde8e8;border-color:#a32d2d;color:#7a1f1f}
.score-wrap.partial .score-in{background:#fff3cd;border-color:#BA7517;color:#633806}
.pts-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.tag-exact{background:#d4edda;color:#1a4a0a}
.tag-sign{background:#fff3cd;color:#633806}
.tag-wrong{background:#fde8e8;color:#7a1f1f}
.res-lbl{font-size:10px;padding:2px 7px;border-radius:4px;background:#dbeeff;color:#0c447c}
.chip-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f0f0e8;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid transparent}
.chip.active{border-color:#185FA5;background:#dbeeff;color:#0c447c}
.prog-bar{height:4px;background:#f0f0e8;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#185FA5;border-radius:2px}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:3px;margin-bottom:.7rem}
.rnk-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0e8}
.rnk-item:last-child{border-bottom:none}
.rnk-pos{font-size:17px;font-weight:700;min-width:26px;color:#999}
.p1{color:#BA7517}.p2{color:#5F5E5A}.p3{color:#854F0B}
.rnk-name{flex:1;font-size:13px;font-weight:700}
.rnk-bar-w{width:70px;height:4px;background:#f0f0e8;border-radius:2px;overflow:hidden}
.rnk-bar{height:100%;background:#185FA5;border-radius:2px}
.rnk-pts{font-size:12px;color:#666;text-align:right;min-width:60px}
.rnk-pts strong{color:#1a1a1a;font-size:17px;font-weight:700;display:block}
.prem-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.7rem}
.prem-box{background:#f0f0e8;border-radius:8px;padding:1rem;text-align:center}
.prem-amt{font-size:22px;font-weight:700;color:#185FA5}
.prem-lbl{font-size:12px;color:#666;margin-top:4px}
.dist-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0e8;font-size:13px}
.dist-row:last-child{border-bottom:none}
.adm-sel{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px;background:#fff;margin-bottom:8px}
.adm-inp{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px;background:#fff}
.btn{padding:7px 14px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;background:#fff}
.btn-blue{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-green{background:#2d6a1a;color:#fff;border-color:#2d6a1a}
.btn-red{background:#a32d2d;color:#fff;border-color:#a32d2d}
.btn-gray{background:#555;color:#fff;border-color:#555}
.radm{width:36px;height:32px;border:1px solid #ccc;border-radius:6px;text-align:center;font-size:14px;font-weight:700;font-family:inherit;background:#f8f8f4}
.upload-zone{border:2px dashed #ccc;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer}
.upload-zone:hover,.upload-zone.drag{border-color:#185FA5;background:#f0f7ff}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:.7rem}
.a-info{background:#dbeeff;color:#0c447c}
.a-ok{background:#d4edda;color:#1a4a0a}
.a-warn{background:#fff3cd;color:#633806}
.a-err{background:#fde8e8;color:#7a1f1f}
.irow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.irow label{font-size:13px;color:#666;min-width:130px}
.empty{text-align:center;padding:2rem;color:#888;font-size:14px}
.divider{border:none;border-top:1px solid #f0f0e8;margin:.7rem 0}
.session-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem}
.badge-admin{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 12px;background:#d4edda;color:#1a4a0a;border-radius:20px;font-weight:700;cursor:pointer;border:1px solid #a3d5a0}
.pct-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pct-row label{font-size:13px;color:#444;min-width:90px}
.pct-row input[type=range]{flex:1;accent-color:#185FA5}
.pct-val{font-size:13px;font-weight:700;min-width:38px;text-align:right;color:#185FA5}
.pct-total{display:inline-block;font-size:13px;font-weight:700;padding:5px 10px;border-radius:6px;margin-top:2px}
.pct-ok{background:#d4edda;color:#1a4a0a}
.pct-bad{background:#fde8e8;color:#7a1f1f}

/* ── BLOQUEO DE PRONÓSTICOS ── */
.locked-banner{background:#fff3cd;border:1px solid #f0c040;border-radius:10px;padding:10px 14px;font-size:13px;color:#633806;margin-bottom:.7rem;display:flex;align-items:center;gap:10px}
.locked-banner .lock-icon{font-size:22px;flex-shrink:0}
.score-locked{display:flex;align-items:center;gap:4px}
.score-locked .score-val{width:30px;height:28px;border:1px solid #d4edda;border-radius:6px;text-align:center;font-size:14px;font-weight:700;background:#f8fdf8;color:#2d6a1a;display:flex;align-items:center;justify-content:center}
.score-locked .score-dash{font-size:14px;font-weight:700;color:#999}
.select-locked{flex:1;padding:5px 10px;border:1px solid #d4edda;border-radius:6px;font-family:inherit;font-size:12px;background:#f8fdf8;color:#2d6a1a;font-weight:700;pointer-events:none;cursor:default;appearance:none}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.modal-box{background:#fff;border-radius:16px;padding:2rem;width:340px;max-width:92vw;text-align:center}
.modal-box h2{font-size:18px;font-weight:700;margin-bottom:.4rem}
.modal-box p{font-size:13px;color:#666;margin-bottom:1.2rem;line-height:1.5}
.modal-icon{font-size:40px;margin-bottom:.7rem}
.modal-box input{width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:15px;text-align:center;letter-spacing:4px;font-family:inherit;margin-bottom:6px}
.modal-box input:focus{outline:none;border-color:#185FA5}
.modal-err{font-size:12px;color:#a32d2d;min-height:18px;margin-bottom:8px}
.modal-btns{display:flex;gap:8px}

/* ── INSTRUCTIVO ANIMADO ───────────────────────────────── */
.tutorial-wrap{position:relative}
.tutorial-hero{background:#0c447c;border-radius:16px;padding:2rem 1.5rem 1.5rem;color:#fff;text-align:center;margin-bottom:1rem;overflow:hidden;position:relative}
.tutorial-hero::before{content:'⚽';font-size:120px;position:absolute;right:-20px;top:-10px;opacity:.08;line-height:1}
.tutorial-hero h2{font-size:20px;font-weight:700;margin-bottom:.3rem}
.tutorial-hero p{font-size:13px;opacity:.8;margin-bottom:1.2rem}
.hero-stats{display:flex;justify-content:center;gap:2rem;margin-top:.5rem}
.hero-stat{text-align:center}
.hero-stat-num{font-size:24px;font-weight:700}
.hero-stat-lbl{font-size:11px;opacity:.7;margin-top:2px}

/* Step cards */
.steps-nav{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px}
.step-nav-btn{padding:6px 14px;border:1.5px solid #e0e0d8;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#888;white-space:nowrap;transition:all .15s}
.step-nav-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}

.step-panel{display:none;animation:fadeIn .25s ease}
.step-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.step-card{background:#fff;border:1px solid #e0e0d8;border-radius:16px;overflow:hidden;margin-bottom:.7rem}
.step-card-head{padding:1.2rem 1.5rem;color:#fff;display:flex;align-items:center;gap:14px}
.step-num-big{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.step-head-text h3{font-size:16px;font-weight:700;margin-bottom:2px}
.step-head-text p{font-size:12px;opacity:.85}
.step-card-body{padding:1.2rem 1.5rem}

/* Mock Excel */
.mock-excel{border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;font-size:12px;margin:1rem 0}
.mock-row{display:grid;align-items:center}
.mock-cell{padding:5px 8px;border-right:1px solid #f0f0e8;border-bottom:1px solid #f0f0e8}
.mock-cell:last-child{border-right:none}
.mock-header{background:#1A5FA8;color:#fff;font-weight:700;font-size:11px}
.mock-name{background:#D6E4F7;color:#0c447c;font-weight:700;font-size:12px}
.mock-input{background:#FFF9C4;color:#1A5FA8;font-weight:700;text-align:center}
.mock-auto{background:#f2f2f2;color:#666;font-style:italic;text-align:center;font-size:11px}
.mock-pts{background:#E4F7D6;color:#2D6A1A;font-weight:700;text-align:center}
.mock-highlight{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Puntos visual */
.pts-showcase{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:1rem 0}
.pts-item{border-radius:10px;padding:.9rem 1rem;display:flex;align-items:center;gap:12px}
.pts-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.pts-detail h4{font-size:14px;font-weight:700;margin-bottom:2px}
.pts-detail p{font-size:11px;opacity:.8;line-height:1.4}

/* Timeline */
.tl{padding-left:24px;position:relative}
.tl::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:#e0e0d8;border-radius:2px}
.tl-item{position:relative;margin-bottom:14px;padding-left:6px}
.tl-dot{width:18px;height:18px;border-radius:50%;position:absolute;left:-24px;top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.tl-title{font-size:13px;font-weight:700;margin-bottom:2px}
.tl-desc{font-size:12px;color:#555;line-height:1.5}

/* Nav buttons */
.step-nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.step-counter{font-size:12px;color:#888}

/* PRONOS groups */
.group-pred-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f0;font-size:13px}
.group-pred-row:last-child{border-bottom:none}
.group-pred-lbl{min-width:90px;font-weight:700;color:#555;font-size:12px}
.group-pred-input{flex:1;padding:5px 10px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:12px;background:#fff9e6;cursor:pointer;appearance:auto}
.group-pred-pts{font-size:11px;padding:2px 7px;border-radius:4px;background:#d4edda;color:#1a4a0a;font-weight:700;white-space:nowrap}

@media(max-width:560px){.prem-grid{grid-template-columns:1fr}.mrow{grid-template-columns:1fr 110px 1fr}.pts-showcase{grid-template-columns:1fr}.hero-stats{gap:1.2rem}}
</style>
</head>

<div class="app">
  <div class="header">
    <h1>⚽ Quiniela Mundial 2026</h1>
    <p>México, USA &amp; Canadá · 11 Jun – 19 Jul · 12 grupos · 104 partidos</p>
  </div>
  <div class="tabs">
    <button class="tab active"        onclick="showTab('tutorial')">📋 Cómo jugar</button>
    <button class="tab"               onclick="showTab('pronos')">Pronósticos</button>
    <button class="tab"               onclick="showTab('grupos')">Grupos</button>
    <button class="tab"               onclick="showTab('ranking')">Ranking</button>
    <button class="tab"               onclick="showTab('premios')">Premios</button>
    <button class="tab tab-admin-btn" id="tab-admin-btn" onclick="tryAdmin()">Admin</button>
  </div>
  <div id="t-tutorial"></div>
  <div id="t-pronos"  style="display:none"></div>
  <div id="t-grupos"  style="display:none"></div>
  <div id="t-ranking" style="display:none"></div>
  <div id="t-premios" style="display:none"></div>
  <div id="t-admin"   style="display:none"></div>
</div>

<div class="modal-bg" id="pw-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">🔐</div>
    <h2 id="modal-title">Área de administración</h2>
    <p id="modal-desc">Solo la administradora puede acceder aquí.</p>
    <input type="password" id="pw-in" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="modal-err" id="pw-err"></div>
    <div class="modal-btns">
      <button class="btn" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" style="flex:1" onclick="checkPw()">Entrar</button>
    </div>
  </div>
</div>

const DB_URL = "https://quiniela-2026-20467-default-rtdb.firebaseio.com";

async function fbGet(path){
  const r = await fetch(`${DB_URL}/${path}.json`);
  return r.ok ? r.json() : null;
}
async function fbSet(path, data){
  await fetch(`${DB_URL}/${path}.json`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}
async function fbPatch(path, data){
  await fetch(`${DB_URL}/${path}.json`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}

// Cargar todos los datos desde Firebase al arrancar
async function loadFromFirebase(){
  showLoading(true);
  try {
    const data = await fbGet('');
    if(data){
      S.predictions  = data.predictions  || {};
      S.results      = data.results      || {};
      S.participants = data.participants || ['Participante 1'];
      S.groupPreds   = data.groupPreds   || {};
      S.cfg          = {...DEF, ...(data.cfg||{})};
    } else {
      // Primera vez: inicializar con valores por defecto
      S.participants = [];
      await fbSet('cfg', DEF);
    }
    if(S.active && !S.participants.includes(S.active)) S.active = S.participants[0]||'';
  } catch(e){ console.error('Firebase error:', e); }
  S.loaded = true;
  showLoading(false);
  renderTutorial();
  startLiveSync();
}

// Sync en tiempo real cada 15 segundos para ranking/resultados
function startLiveSync(){
  setInterval(async()=>{
    if(!S.tab || S.tab==='admin') return;
    try {
      const res = await fbGet('results');
      const parts = await fbGet('participants');
      const preds = await fbGet('predictions');
      const gp = await fbGet('groupPreds');
      if(res) S.results = res;
      if(parts) S.participants = parts;
      if(preds) S.predictions = preds;
      if(gp) S.groupPreds = gp;
      if(S.tab==='ranking') renderRanking();
      if(S.tab==='premios') renderPremios();
      if(S.tab==='pronos') renderPronos();
    } catch(e){}
  }, 15000);

async function sha256(t){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));
  return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function parseScore(s){
  if(!s&&s!==0)return null;
  const m=String(s).trim().match(/^(\d+)\s*[-–]\s*(\d+)$/);
  return m?{h:parseInt(m[1]),a:parseInt(m[2])}:null;
}
function sign(sc){return!sc?null:sc.h>sc.a?'home':sc.h<sc.a?'away':'draw'}

function calcPts(participant){
  let pts=0,exact=0,partial=0,total=0;
  const preds=S.predictions[participant]||{};
  MATCHES.forEach(m=>{
    const res=parseScore(S.results[m.id]),pr=parseScore(preds[m.id]);
    if(!res||!pr)return; total++;
    if(pr.h===res.h&&pr.a===res.a){pts+=S.cfg.pts_exact;exact++;}
    else if(sign(pr)===sign(res)){pts+=S.cfg.pts_sign;partial++;}
  });
  return{pts,exact,partial,total};
}
function getRanking(){
  return S.participants.map(p=>({name:p,...calcPts(p)})).sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
}

  return Object.keys(preds).length > 0;
}

function tryAdmin(){

  const first=!S.cfg.pw_set;
  document.getElementById('modal-icon').textContent=first?'⚙️':'🔐';
  document.getElementById('modal-title').textContent=first?'Crear contraseña admin':'Área de administración';
  document.getElementById('modal-desc').textContent=first?'Primera vez: crea tu contraseña de administradora.':'Solo la administradora puede acceder aquí.';
  document.getElementById('pw-err').textContent='';
  document.getElementById('pw-in').value='';
  document.getElementById('pw-modal').style.display='flex';
  setTimeout(()=>document.getElementById('pw-in').focus(),60);
}
function closeModal(){document.getElementById('pw-modal').style.display='none';document.getElementById('pw-in').value='';}
async function checkPw(){
  const val=document.getElementById('pw-in').value;
  if(!val){document.getElementById('pw-err').textContent='Escribe una contraseña';return;}
  if(!S.cfg.pw_set){
    if(val.length<4){document.getElementById('pw-err').textContent='Mínimo 4 caracteres';return;}
    S.cfg.pw_hash=await sha256(val);S.cfg.pw_set=true;saveSection('cfg',S.cfg);
    unlockAdmin();closeModal();showTab('admin');return;
  }
  const h=await sha256(val);
  if(h===S.cfg.pw_hash){unlockAdmin();closeModal();showTab('admin');}
  else{document.getElementById('pw-err').textContent='❌ Contraseña incorrecta';document.getElementById('pw-in').value='';document.getElementById('pw-in').focus();}
}
function unlockAdmin(){S.adminUnlocked=true;document.getElementById('tab-admin-btn').classList.add('unlocked');}
function lockAdmin(){S.adminUnlocked=false;document.getElementById('tab-admin-btn').classList.remove('unlocked');showTab('tutorial');}

// ── TABS ──────────────────────────────────────────
function showTab(tab){
  if(tab==='admin'&&!S.adminUnlocked){tryAdmin();return;}
  S.tab=tab;
  ['tutorial','pronos','grupos','ranking','premios','admin'].forEach(t=>{
    document.getElementById('t-'+t).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['tutorial','pronos','grupos','ranking','premios','admin'][i]===tab);
  });
  ({tutorial:renderTutorial,pronos:renderPronos,grupos:renderGrupos,ranking:renderRanking,premios:renderPremios,admin:renderAdmin})[tab]();
}

function goStep(i){

// ── PRONÓSTICOS ───────────────────────────────────
function renderPronos(){
  const el=document.getElementById('t-pronos');
  const preds=S.predictions[S.active]||{};
  const predCount=MATCHES.filter(m=>parseScore(preds[m.id])).length;
  const resCount=MATCHES.filter(m=>parseScore(S.results[m.id])).length;
  const locked=isLocked(S.active);

  let h=`<div class="alert a-info">Pronósticos de: <strong>${S.active}</strong></div>`;
  h+=`<div class="chip-wrap">${S.participants.map(p=>`<span class="chip ${p===S.active?'active':''}" onclick="S.active='${p}';localStorage.setItem('q26_active','${p}');renderPronos()">${p}</span>`).join('')}</div>`;

  if(locked){
    h+=`<div class="locked-banner"><span class="lock-icon">🔒</span><div><strong>Pronósticos bloqueados</strong> — Ya entregaste tu Excel. Solo el admin puede actualizarlos subiendo un nuevo archivo en la pestaña Admin.</div></div>`;
  }

  h+=`<div class="prog-bar"><div class="prog-fill" style="width:${Math.round(predCount/72*100)}%"></div></div>
      <div class="prog-lbl"><span>${predCount}/72 marcadores</span><span>${resCount} resultados cargados</span></div>`;

  // Clasificación de grupos
  h+=`<div class="card">
    <div class="sec">1° y 2° lugar por grupo (2 pts cada uno) — elige de la lista ▼</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px">`;
  Object.keys(GROUPS_DATA).forEach(g=>{
    const gp=S.groupPreds[S.active]||{};
    const col=GROUP_COLORS[g];
    const teams=GROUPS_DATA[g];
    const v1=gp[g+'_1']||'';
    const v2=gp[g+'_2']||'';
    const opts=`<option value="">— elige —</option>${teams.map(t=>`<option value="${t}" ${v1===t?'selected':''}>${t}</option>`).join('')}`;
    const opts2=`<option value="">— elige —</option>${teams.map(t=>`<option value="${t}" ${v2===t?'selected':''}>${t}</option>`).join('')}`;
    h+=`<div style="border:1px solid #e0e0d8;border-radius:8px;overflow:hidden">
      <div style="background:${col};color:#fff;font-size:12px;font-weight:700;padding:5px 10px">Grupo ${g} — ${teams.join(', ')}</div>
      <div style="padding:6px 10px">
        <div class="group-pred-row">
          <div class="group-pred-lbl">🥇 1er lugar</div>
          ${locked
            ? `<div class="select-locked">${v1||'—'}</div>`
            : `<select class="group-pred-input" onchange="setGroupPred('${g}','1',this.value)">${opts}</select>`}
          <div class="group-pred-pts">2 pts</div>
        </div>
        <div class="group-pred-row">
          <div class="group-pred-lbl">🥈 2do lugar</div>
          ${locked
            ? `<div class="select-locked">${v2||'—'}</div>`
            : `<select class="group-pred-input" onchange="setGroupPred('${g}','2',this.value)">${opts2}</select>`}
          <div class="group-pred-pts">2 pts</div>
        </div>
      </div>
    </div>`;
  });
  h+=`</div></div>`;

  // Partidos por grupo
  const groups=[...new Set(MATCHES.map(m=>m.g))];
  groups.forEach(g=>{
    const col=GROUP_COLORS[g];
    h+=`<div class="card"><div class="sec" style="color:${col}">Grupo ${g} — Marcadores</div>`;
    MATCHES.filter(m=>m.g===g).forEach(m=>{
      const pr=parseScore(preds[m.id]),res=parseScore(S.results[m.id]);
      let wc='score-wrap',ptTag='';
      if(pr&&!res) wc+=' filled';
      else if(pr&&res){
        const ex=pr.h===res.h&&pr.a===res.a,sg=sign(pr)===sign(res);
        if(ex){wc+=' correct';ptTag=`<span class="pts-tag tag-exact">+${S.cfg.pts_exact}</span>`;}
        else if(sg){wc+=' partial';ptTag=`<span class="pts-tag tag-sign">+${S.cfg.pts_sign}</span>`;}
        else{wc+=' wrong';ptTag=`<span class="pts-tag tag-wrong">0</span>`;}
      }
      // Vista según bloqueo
      const scoreDisplay = (locked && pr)
        ? `<div class="score-locked">
             <div class="score-val">${pr.h}</div>
             <span class="score-dash">-</span>
             <div class="score-val">${pr.a}</div>
           </div>`
        : `<div class="${wc}">
             <input class="score-in" type="number" min="0" max="20" value="${pr?pr.h:''}" placeholder="0" id="h_${m.id}" onchange="setPred('${m.id}')">
             <span class="score-dash">-</span>
             <input class="score-in" type="number" min="0" max="20" value="${pr?pr.a:''}" placeholder="0" id="a_${m.id}" onchange="setPred('${m.id}')">
           </div>
           ${locked && !pr ? '<div style="font-size:10px;color:#aaa;font-style:italic;margin-top:2px">Sin pronóstico</div>' : ''}`;
      h+=`<div class="mrow">
        <div class="th"><div class="tname">${m.h}</div></div>
        <div class="mcenter">
          <div class="mdate">${m.d}</div>
          ${scoreDisplay}
          ${ptTag}
          ${res?`<div style="margin-top:2px;font-size:10px;color:#666">Real: <strong style="color:#185FA5">${res.h}-${res.a}</strong> <span class="res-lbl">${sign(res)==='home'?'Local':sign(res)==='away'?'Visitante':'Empate'}</span></div>`:''}
        </div>
        <div class="ta"><div class="tname">${m.a}</div></div>
      </div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

function setPred(mid){
  const hv=document.getElementById('h_'+mid).value,av=document.getElementById('a_'+mid).value;
  if(hv===''||av==='')return;
  const h=parseInt(hv),a=parseInt(av);
  if(isNaN(h)||isNaN(a))return;
  if(!S.predictions[S.active])S.predictions[S.active]={};
  S.predictions[S.active][mid]=`${h}-${a}`;
  saveSection('predictions', S.predictions);
}

function setGroupPred(g,pos,val){
  if(!S.groupPreds[S.active])S.groupPreds[S.active]={};
  S.groupPreds[S.active][g+'_'+pos]=val.trim();
  saveSection('groupPreds', S.groupPreds);
}

function recalcPcts(){
  const p1=parseInt(document.getElementById('c-p1').value)||0;
  const p2=parseInt(document.getElementById('c-p2').value)||0;
  const p3=parseInt(document.getElementById('c-p3').value)||0;
  const sum=p1+p2+p3;
  document.getElementById('v-p1').textContent=p1+'%';
  document.getElementById('v-p2').textContent=p2+'%';
  document.getElementById('v-p3').textContent=p3+'%';
  const el=document.getElementById('pct-sum');
  el.textContent=sum+'%';el.className='pct-total '+(sum===100?'pct-ok':'pct-bad');
}
function fillResult(){
  const mid=document.getElementById('res-sel').value;
  const sc=parseScore(S.results[mid]);
  document.getElementById('res-h').value=sc?sc.h:'';
  document.getElementById('res-a').value=sc?sc.a:'';
}
function saveResult(){
  const mid=document.getElementById('res-sel').value;if(!mid)return;
  const h=document.getElementById('res-h').value,a=document.getElementById('res-a').value;
  if(h===''||a===''){document.getElementById('res-fb').innerHTML=`<div class="alert a-warn">Ingresa ambos goles</div>`;return;}
  const m=MATCHES.find(x=>x.id===mid);
  S.results[mid]=`${parseInt(h)}-${parseInt(a)}`;saveSection('results',S.results);
  document.getElementById('res-fb').innerHTML=`<div class="alert a-ok">✓ ${m.h} ${h}-${a} ${m.a} guardado</div>`;
  renderAdmin();
}
function deleteResult(){
  const mid=document.getElementById('res-sel').value;if(!mid)return;
  delete S.results[mid];saveSection('results',S.results);renderAdmin();
}
function addPart(){
  const v=document.getElementById('np').value.trim();
  if(!v||S.participants.includes(v))return;
  S.participants.push(v);saveSection('participants',S.participants);renderAdmin();
}
function removePart(n){
  S.participants=S.participants.filter(p=>p!==n);
  if(S.active===n)S.active=S.participants[0]||'';
  saveSection('participants',S.participants);renderAdmin();
}
function saveCfg(){
  const p1=parseInt(document.getElementById('c-p1').value)||0;
  const p2=parseInt(document.getElementById('c-p2').value)||0;
  const p3=parseInt(document.getElementById('c-p3').value)||0;
  if(p1+p2+p3!==100){alert('Los porcentajes deben sumar 100%.');return;}
  S.cfg.cuota    =parseInt(document.getElementById('c-cuota').value)||200;
  S.cfg.reg      =parseInt(document.getElementById('c-reg').value)||40;
  S.cfg.pts_exact=parseInt(document.getElementById('c-pts-e').value)||3;
  S.cfg.pts_sign =parseInt(document.getElementById('c-pts-s').value)||1;
  S.cfg.p1=p1;S.cfg.p2=p2;S.cfg.p3=p3;
  saveSection('cfg',S.cfg).then(()=>{alert('✅ Configuración guardada');renderAdmin();});
}
async function changePw(){
  const val=document.getElementById('new-pw').value;
  const fb=document.getElementById('pw-chg-fb');
  if(!val||val.length<4){fb.innerHTML=`<span style="color:#a32d2d">Mínimo 4 caracteres</span>`;return;}
  S.cfg.pw_hash=await sha256(val);S.cfg.pw_set=true;saveSection('cfg',S.cfg);
  document.getElementById('new-pw').value='';
  fb.innerHTML=`<span style="color:#1a4a0a">✅ Contraseña cambiada</span>`;
}
function handleDrop(e){
  e.preventDefault();document.getElementById('dz').classList.remove('drag');
  if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);
}
function handleFile(file){
  if(!file)return;
  const el=document.getElementById('upload-res');
  el.innerHTML=`<div class="alert a-info">Procesando ${file.name}…</div>`;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});

      // ── Hoja 1: Fase de Grupos ───────────────────────
      const ws=wb.Sheets['Fase de Grupos'];
      if(!ws){el.innerHTML=`<div class="alert a-err">No se encontró la hoja "Fase de Grupos".</div>`;return;}
      const nc=ws['C3'];
      let nombre=nc?String(nc.v||'').replace('← Escribe tu nombre aquí','').trim():'';
      if(!nombre){el.innerHTML=`<div class="alert a-err">⚠️ Celda C3 vacía — el participante debe escribir su nombre.</div>`;return;}
      if(!S.predictions[nombre])S.predictions[nombre]={};
      let count=0,bad=0;

      // Auto-detectar formato: nuevo (H=idx7, J=idx9 con col hora) o viejo (G=idx6, I=idx8)
      const testNew=ws[XLSX.utils.encode_cell({r:5,c:7})];
      const testOld=ws[XLSX.utils.encode_cell({r:5,c:6})];
      // Si hay hora en col D (idx3) y local en col E (idx4) → formato nuevo
      const hasHora=ws[XLSX.utils.encode_cell({r:5,c:3})]?.v;
      const colH = hasHora ? 7 : 6;  // col H nuevo / col G viejo
      const colA = hasHora ? 9 : 8;  // col J nuevo / col I viejo

      MATCHES.forEach((m,i)=>{
        const rowIdx=i+5;
        const cH=ws[XLSX.utils.encode_cell({r:rowIdx,c:colH})];
        const cA=ws[XLSX.utils.encode_cell({r:rowIdx,c:colA})];
        const hv=cH&&cH.v!==undefined?String(cH.v).trim():'';
        const av=cA&&cA.v!==undefined?String(cA.v).trim():'';
        if(hv!==''&&av!==''){
          const h=parseInt(hv),a=parseInt(av);
          if(!isNaN(h)&&!isNaN(a)&&h>=0&&a>=0){S.predictions[nombre][m.id]=`${h}-${a}`;count++;}
          else bad++;
        }
      });

      // ── Hoja 2: Pronósticos Iniciales (1°/2° de grupo) ──
      // Layout: grupos A-L en pares de filas
      // Encabezados en fila 7 (r=6), datos empiezan en fila 8 (r=7)
      // Col B (idx 1) = pronóstico 1°, Col E (idx 4) = pronóstico 2°
      // Cada grupo ocupa 1 fila; orden A,B,C,...L = filas 8..19
      const ws2=wb.Sheets['Pronósticos Iniciales'];
      if(!S.groupPreds[nombre])S.groupPreds[nombre]={};
      let gpCount=0;
      if(ws2){
        const groups=Object.keys(GROUPS_DATA);
        groups.forEach((g,gi)=>{
          // Grupos empiezan en fila 7 (idx 6): A=fila7, B=fila8 ... L=fila18
          const dataRow=6+gi;
          const c1=ws2[XLSX.utils.encode_cell({r:dataRow,c:1})]; // col B = 1° lugar
          const c2=ws2[XLSX.utils.encode_cell({r:dataRow,c:4})]; // col E = 2° lugar
          const v1=c1&&c1.v!==undefined?String(c1.v).trim():'';
          const v2=c2&&c2.v!==undefined?String(c2.v).trim():'';
          if(v1&&!v1.includes('←')&&!v1.includes('Grp')&&!v1.includes('Grupo')){S.groupPreds[nombre][g+'_1']=v1;gpCount++;}
          if(v2&&!v2.includes('←')&&!v2.includes('Grp')&&!v2.includes('Grupo')){S.groupPreds[nombre][g+'_2']=v2;gpCount++;}
        });
      }

      if(!S.participants.includes(nombre))S.participants.push(nombre);
      S.active=nombre;localStorage.setItem('q26_active',nombre);await save();
      el.innerHTML=`<div class="alert a-ok">✅ <strong>${nombre}</strong> — ${count} marcadores importados${gpCount?` · ${gpCount} pronósticos de grupos`:''}${bad?` · ${bad} inválidos`:''}.</div>`;
      renderAdmin();
    }catch(err){el.innerHTML=`<div class="alert a-err">Error: ${err.message}</div>`;}
  };
  reader.readAsArrayBuffer(file);
}

loadFromFirebase();
</script>
